server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/certs/reverse-proxy.crt;
    ssl_certificate_key /etc/ssl/private/reverse-proxy.key;

    location / {
        proxy_pass http://10.20.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
